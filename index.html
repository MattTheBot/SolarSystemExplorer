<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System Explorer</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #fff; }
  canvas { display: block; }

  #info-panel {
    position: fixed; top: 50%; right: 28px;
    transform: translateY(-50%) translateX(20px);
    width: 240px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 14px; padding: 20px 22px;
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  #info-panel.visible { opacity: 1; transform: translateY(-50%) translateX(0); pointer-events: auto; }
  #info-panel .planet-label { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
  #info-panel h2 { font-size: 22px; font-weight: 600; color: #fff; margin-bottom: 14px; }
  #info-panel .divider { height: 1px; background: rgba(255,255,255,0.1); margin-bottom: 14px; }
  .fact-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 8px; font-size: 12.5px; }
  .fact-row .fact-label { color: rgba(255,255,255,0.45); white-space: nowrap; }
  .fact-row .fact-value { color: #fff; text-align: right; font-weight: 500; }

  #nav-hint { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); font-size: 12px; color: rgba(255,255,255,0.28); letter-spacing: 0.05em; pointer-events: none; }

  #labels { position: fixed; inset: 0; pointer-events: none; }
  .planet-tag { position: absolute; transform: translate(-50%, -140%); font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.5); letter-spacing: 0.06em; white-space: nowrap; pointer-events: none; transition: opacity 0.3s; }

  #loading { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; transition: opacity 0.8s; }
  #loading h1 { font-size: 13px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 22px; }
  .loader-bar { width: 160px; height: 1px; background: rgba(255,255,255,0.1); }
  .loader-fill { height: 100%; width: 30%; background: rgba(255,255,255,0.55); transition: width 0.3s ease; }

  #flying-to { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.45); opacity: 0; pointer-events: none; transition: opacity 0.4s; }
  #flying-to.visible { opacity: 1; }
</style>
</head>
<body>

<div id="loading">
  <h1>Solar System</h1>
  <div class="loader-bar"><div class="loader-fill"></div></div>
  <p id="load-status" style="margin-top:16px;font-size:11px;color:rgba(255,255,255,0.25);letter-spacing:0.08em;">Loading renderer…</p>
  <p style="margin-top:12px;font-size:11px;color:rgba(255,255,255,0.15);">Click/tap to dismiss if stuck</p>
</div>

<div id="labels"></div>

<div id="info-panel">
  <div class="planet-label">Now viewing</div>
  <h2 id="panel-name"></h2>
  <div class="divider"></div>
  <div id="panel-facts"></div>
</div>

<div id="flying-to">Flying to &nbsp;<span id="flying-name"></span></div>
<div id="orbit-btn" style="position:fixed;top:20px;right:20px;font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.45);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:8px 14px;cursor:pointer;backdrop-filter:blur(10px);background:rgba(255,255,255,0.05);user-select:none;transition:color 0.2s,border-color 0.2s;" title="Toggle orbital animation">Orbits: OFF</div>
<div id="nav-hint">WASD / arrows — move &nbsp;·&nbsp; Mouse drag — look &nbsp;·&nbsp; Click planet — fly there &nbsp;·&nbsp; Space — toggle orbits</div>

<script>
// ── Boot: load Three.js then start ───────────────────────────
function loadScript(src, cb) {
  const s = document.createElement('script');
  s.src = src;
  s.onload = cb;
  s.onerror = () => {
    document.getElementById('loading').innerHTML =
      '<p style="color:rgba(255,255,255,0.5);font-size:13px;text-align:center;padding:2rem;">Could not load Three.js.<br>Check your internet connection and reload.</p>';
  };
  document.head.appendChild(s);
}

// WebGL check
function hasWebGL() {
  try {
    const c = document.createElement('canvas');
    return !!(c.getContext('webgl') || c.getContext('experimental-webgl'));
  } catch(e) { return false; }
}

window.addEventListener('DOMContentLoaded', () => {
  if (!hasWebGL()) {
    document.getElementById('loading').innerHTML =
      '<p style="color:rgba(255,255,255,0.5);font-size:13px;text-align:center;padding:2rem;">WebGL is not available in this browser.<br>Try Chrome or Firefox.</p>';
    return;
  }
  loadScript('https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js', initScene);
});

function setStatus(msg, pct) {
  const s = document.getElementById('load-status');
  const f = document.querySelector('.loader-fill');
  if (s) s.textContent = msg;
  if (f) f.style.width = pct + '%';
}

function initScene() {
  setStatus('Building scene…', 40);

// ─────────────────────────────────────────────────────────────
//  SCALE HELPERS
//  Real AU distances → log-compressed display units
//  Earth orbit = 40 display units from Sun
// ─────────────────────────────────────────────────────────────
function auToDisplay(au) {
  return (Math.log(au + 1) / Math.log(2)) * 40;
}

// All planet radii are relative to Earth = 1.0
// DISPLAY_SCALE converts those ratios to screen units
const DISPLAY_SCALE = 0.13;

// ─────────────────────────────────────────────────────────────
//  PLANET DATA  (real orbital ratios, real size ratios)
// ─────────────────────────────────────────────────────────────
const BODIES = [
  {
    id: 'mercury', name: 'Mercury', color: 0xa8a8a8,
    realRadius: 0.383, orbitalAU: 0.387, orbitalPeriodDays: 88.0, axialTiltDeg: 0.034,
    facts: { 'Distance from Sun':'0.387 AU','Orbital period':'88 days','Radius':'2,440 km','Moons':'0','Surface temp':'−180 → 430 °C' }
  },
  {
    id: 'venus', name: 'Venus', color: 0xd4a96a,
    realRadius: 0.949, orbitalAU: 0.723, orbitalPeriodDays: 224.7, axialTiltDeg: 177.4,
    facts: { 'Distance from Sun':'0.723 AU','Orbital period':'224.7 days','Radius':'6,052 km','Moons':'0','Surface temp':'465 °C avg' }
  },
  {
    id: 'earth', name: 'Earth', color: 0x2e6fd9,
    realRadius: 1.0, orbitalAU: 1.000, orbitalPeriodDays: 365.25, axialTiltDeg: 23.44,
    facts: { 'Distance from Sun':'1.000 AU','Orbital period':'365.25 days','Radius':'6,371 km','Moons':'1 (The Moon)','Surface temp':'−88 → 58 °C' },
    moons: [{
      id: 'moon', name: 'The Moon', color: 0xaaaaaa,
      realRadius: 0.2727,
      orbitDisplayR: 2.6,   // display units around Earth
      orbitalPeriodDays: 27.32,
      facts: { 'Parent':'Earth','Orbital period':'27.32 days','Radius':'1,737 km','Distance from Earth':'384,400 km','Surface temp':'−173 → 127 °C' }
    }]
  },
  {
    id: 'mars', name: 'Mars', color: 0xc1440e,
    realRadius: 0.532, orbitalAU: 1.524, orbitalPeriodDays: 686.97, axialTiltDeg: 25.19,
    facts: { 'Distance from Sun':'1.524 AU','Orbital period':'686.97 days','Radius':'3,390 km','Moons':'2','Surface temp':'−143 → 35 °C' }
  },
  {
    id: 'jupiter', name: 'Jupiter', color: 0xc8a060,
    realRadius: 11.209, orbitalAU: 5.204, orbitalPeriodDays: 4332.59, axialTiltDeg: 3.13,
    facts: { 'Distance from Sun':'5.204 AU','Orbital period':'11.86 years','Radius':'71,492 km','Moons':'95 known','Type':'Gas giant (H₂/He)' }
  },
  {
    id: 'saturn', name: 'Saturn', color: 0xe8d8a0,
    realRadius: 9.449, orbitalAU: 9.582, orbitalPeriodDays: 10759.22, axialTiltDeg: 26.73,
    hasRings: true,
    facts: { 'Distance from Sun':'9.582 AU','Orbital period':'29.46 years','Radius':'60,268 km','Moons':'146 known','Density':'0.687 g/cm³' }
  },
  {
    id: 'uranus', name: 'Uranus', color: 0x7de8e8,
    realRadius: 4.007, orbitalAU: 19.20, orbitalPeriodDays: 30688.5, axialTiltDeg: 97.77,
    hasRings: true,
    facts: { 'Distance from Sun':'19.20 AU','Orbital period':'84.01 years','Radius':'25,559 km','Moons':'28 known','Axial tilt':'97.77° — spins sideways' }
  },
  {
    id: 'neptune', name: 'Neptune', color: 0x3f54ba,
    realRadius: 3.883, orbitalAU: 30.07, orbitalPeriodDays: 60182.0, axialTiltDeg: 28.32,
    facts: { 'Distance from Sun':'30.07 AU','Orbital period':'164.8 years','Radius':'24,622 km','Moons':'16 known','Wind speed':'Up to 2,100 km/h' }
  }
];

// ─────────────────────────────────────────────────────────────
//  SCENE
// ─────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.01, 20000);
camera.position.set(0, 50, 90);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Lighting
const sunLight = new THREE.PointLight(0xfff8e7, 2.8, 6000);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x0d0d18, 1));

// Starfield
const starPos = new Float32Array(9000);
for (let i = 0; i < 9000; i++) starPos[i] = (Math.random() - 0.5) * 9000;
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.3, sizeAttenuation: true })));

// Sun
const SUN_R = 109 * DISPLAY_SCALE * 0.45;
const sunMesh = new THREE.Mesh(
  new THREE.SphereGeometry(SUN_R, 48, 48),
  new THREE.MeshBasicMaterial({ color: 0xffcc44 })
);
scene.add(sunMesh);
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(SUN_R * 1.3, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0xff8800, transparent: true, opacity: 0.07, side: THREE.BackSide })
));

// ─────────────────────────────────────────────────────────────
//  BUILD PLANETS
// ─────────────────────────────────────────────────────────────
const clickableObjects = [];
const planetPivots     = [];
const labelsDiv        = document.getElementById('labels');

BODIES.forEach(body => {
  const dispR     = Math.max(0.18, body.realRadius * DISPLAY_SCALE);
  const dispOrbit = auToDisplay(body.orbitalAU);

  // Orbital ring
  const orbitRing = new THREE.Mesh(
    new THREE.RingGeometry(dispOrbit - 0.04, dispOrbit + 0.04, 200),
    new THREE.MeshBasicMaterial({ color: 0x1a1a1a, side: THREE.DoubleSide })
  );
  orbitRing.rotation.x = Math.PI / 2;
  scene.add(orbitRing);

  // Planet pivot
  const pivot = new THREE.Object3D();
  scene.add(pivot);

  // ┌──────────────────────────────────────────────────────────┐
  // │  SWAP MODEL — replace SphereGeometry below with your     │
  // │  loaded GLTFLoader mesh, keyed on body.id                │
  // │  e.g.: if (body.id === 'earth') mesh = gltfScene;        │
  // └──────────────────────────────────────────────────────────┘
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(dispR, 40, 40),
    new THREE.MeshPhongMaterial({
      color: body.color,
      shininess: (body.id === 'earth' || body.id === 'venus') ? 55 : 8,
      specular: 0x1a1a1a
    })
  );
  mesh.position.x = dispOrbit;
  mesh.rotation.z = THREE.MathUtils.degToRad(body.axialTiltDeg || 0);
  mesh.userData.bodyId = body.id;
  pivot.add(mesh);
  clickableObjects.push(mesh);

  // Rings (Saturn / Uranus)
  if (body.hasRings) {
    const ri = dispR * 1.38, ro = dispR * 2.3;
    const rg = new THREE.RingGeometry(ri, ro, 128);
    const rp = rg.attributes.position, ruv = rg.attributes.uv;
    const rv = new THREE.Vector3();
    for (let i = 0; i < rp.count; i++) {
      rv.fromBufferAttribute(rp, i);
      ruv.setXY(i, rv.length() < (ri+ro)/2 ? 0 : 1, 1);
    }
    const ring = new THREE.Mesh(rg, new THREE.MeshBasicMaterial({
      color: body.id === 'saturn' ? 0xb8a870 : 0x88b8c8,
      side: THREE.DoubleSide, transparent: true, opacity: 0.6
    }));
    ring.rotation.x = body.id === 'uranus'
      ? Math.PI/2 - THREE.MathUtils.degToRad(8)
      : Math.PI/2 - THREE.MathUtils.degToRad(25);
    mesh.add(ring);
  }

  // DOM label
  const label = document.createElement('div');
  label.className = 'planet-tag';
  label.textContent = body.name;
  labelsDiv.appendChild(label);

  // Moons
  const moonRecords = [];
  if (body.moons) {
    body.moons.forEach(moon => {
      const moonPivot = new THREE.Object3D();
      scene.add(moonPivot);

      const moonR = Math.max(0.06, moon.realRadius * dispR);

      // ┌────────────────────────────────────────────────────────┐
      // │  SWAP MODEL — replace SphereGeometry for moon.id       │
      // └────────────────────────────────────────────────────────┘
      const moonMesh = new THREE.Mesh(
        new THREE.SphereGeometry(moonR, 24, 24),
        new THREE.MeshPhongMaterial({ color: moon.color, shininess: 4 })
      );
      moonMesh.position.x = moon.orbitDisplayR;
      moonMesh.userData.bodyId = moon.id;
      moonPivot.add(moonMesh);
      clickableObjects.push(moonMesh);

      const moonLabel = document.createElement('div');
      moonLabel.className = 'planet-tag';
      moonLabel.textContent = moon.name;
      labelsDiv.appendChild(moonLabel);

      moonRecords.push({ pivot: moonPivot, mesh: moonMesh, data: moon, labelEl: moonLabel, parentMesh: mesh, dispR });
    });
  }

  planetPivots.push({ pivot, body, mesh, dispR, dispOrbit, moons: moonRecords, labelEl: label });
});

// ─────────────────────────────────────────────────────────────
//  ORBITAL SIMULATION — toggled by Spacebar or button
// ─────────────────────────────────────────────────────────────
const TIME_SCALE = 8;
let simDays = 0;
let orbitsRunning = false;

const _wp = new THREE.Vector3();
function getWorldPos(m) { m.getWorldPosition(_wp); return _wp.clone(); }

function setOrbitBtn() {
  const btn = document.getElementById('orbit-btn');
  if (!btn) return;
  btn.textContent = orbitsRunning ? 'Orbits: ON' : 'Orbits: OFF';
  btn.style.color = orbitsRunning ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.35)';
  btn.style.borderColor = orbitsRunning ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.12)';
}

document.getElementById('orbit-btn').addEventListener('click', () => {
  orbitsRunning = !orbitsRunning; setOrbitBtn();
});

function updateOrbits(dt) {
  if (!orbitsRunning) return;
  simDays += dt * TIME_SCALE;
  planetPivots.forEach(({ pivot, body, mesh, moons }) => {
    pivot.rotation.y = (simDays / body.orbitalPeriodDays) * Math.PI * 2;
    mesh.rotation.y += dt * 0.25;
    moons.forEach(m => {
      const pw = getWorldPos(m.parentMesh);
      m.pivot.position.copy(pw);
      m.pivot.rotation.y = (simDays / m.data.orbitalPeriodDays) * Math.PI * 2;
      m.mesh.rotation.y += dt * 0.1;
    });
  });
  sunMesh.scale.setScalar(1 + 0.012 * Math.sin(simDays * 0.4));
}

// ─────────────────────────────────────────────────────────────
//  FREE-LOOK CAMERA — WASD + mouse drag
// ─────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); orbitsRunning = !orbitsRunning; setOrbitBtn(); }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

let camYaw = -Math.PI / 2, camPitch = -0.35;
let isDragging = false, didDrag = false;
let lastMX = 0, lastMY = 0;

renderer.domElement.addEventListener('mousedown', e => {
  isDragging = true; didDrag = false;
  lastMX = e.clientX; lastMY = e.clientY;
});
window.addEventListener('mouseup', () => { isDragging = false; });
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - lastMX, dy = e.clientY - lastMY;
  lastMX = e.clientX; lastMY = e.clientY;
  if (Math.abs(dx) + Math.abs(dy) > 2) didDrag = true;
  camYaw   += dx * 0.003;
  camPitch  = Math.max(-1.5, Math.min(1.5, camPitch - dy * 0.003));
  applyLook();
});

renderer.domElement.addEventListener('touchstart', e => {
  if (e.touches.length===1) { isDragging=true; didDrag=false; lastMX=e.touches[0].clientX; lastMY=e.touches[0].clientY; }
},{ passive:true });
window.addEventListener('touchend', () => { isDragging=false; });
window.addEventListener('touchmove', e => {
  if (!isDragging||e.touches.length!==1) return;
  const dx=e.touches[0].clientX-lastMX, dy=e.touches[0].clientY-lastMY;
  lastMX=e.touches[0].clientX; lastMY=e.touches[0].clientY;
  if (Math.abs(dx)+Math.abs(dy)>2) didDrag=true;
  camYaw+=dx*0.003;
  camPitch=Math.max(-1.5,Math.min(1.5,camPitch-dy*0.003));
  applyLook();
},{ passive:true });

function applyLook() {
  const qY = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), camYaw);
  const qP = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0), camPitch);
  camera.quaternion.copy(qY).multiply(qP);
}

function updateMovement(dt) {
  if (isFlying) return;
  const spd = 18 * dt;
  const fwd   = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
  const up    = new THREE.Vector3(0,1,0);
  if (keys['KeyW']||keys['ArrowUp'])    camera.position.addScaledVector(fwd,  spd);
  if (keys['KeyS']||keys['ArrowDown'])  camera.position.addScaledVector(fwd, -spd);
  if (keys['KeyA']||keys['ArrowLeft'])  camera.position.addScaledVector(right,-spd);
  if (keys['KeyD']||keys['ArrowRight']) camera.position.addScaledVector(right, spd);
  if (keys['KeyQ']) camera.position.addScaledVector(up,  spd);
  if (keys['KeyE']) camera.position.addScaledVector(up, -spd);
}
applyLook();

// ─────────────────────────────────────────────────────────────
//  LABEL PROJECTION
// ─────────────────────────────────────────────────────────────
const _ndc = new THREE.Vector3();
function projectLabel(mesh, el) {
  const wpos = getWorldPos(mesh);
  _ndc.copy(wpos).project(camera);
  if (_ndc.z > 1) { el.style.opacity = 0; return; }
  const sx = (_ndc.x * 0.5 + 0.5) * innerWidth;
  const sy = (_ndc.y * -0.5 + 0.5) * innerHeight;
  el.style.left = sx + 'px';
  el.style.top  = sy + 'px';
  const d = wpos.distanceTo(camera.position);
  el.style.opacity = Math.min(1, 70 / d).toString();
}

function updateLabels() {
  planetPivots.forEach(({ mesh, labelEl, moons }) => {
    projectLabel(mesh, labelEl);
    moons.forEach(m => projectLabel(m.mesh, m.labelEl));
  });
}

// ─────────────────────────────────────────────────────────────
//  CAMERA FLIGHT
// ─────────────────────────────────────────────────────────────
let isFlying = false;
let flightT = 0;
const FLIGHT_DUR = 2.4;
const flightFrom = new THREE.Vector3();
const flightTo   = new THREE.Vector3();

const flyingToEl   = document.getElementById('flying-to');
const flyingNameEl = document.getElementById('flying-name');

function startFlight(targetPos, name, arrivalDist) {
  flightFrom.copy(camera.position);
  const dir = targetPos.clone().sub(camera.position).normalize();
  flightTo.copy(targetPos).addScaledVector(dir, -arrivalDist);
  flightT = 0;
  isFlying = true;
  flyingNameEl.textContent = name;
  flyingToEl.classList.add('visible');
}

function easeInOut(t) {
  return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;
}

function updateFlight(dt) {
  if (!isFlying) return;
  flightT = Math.min(1, flightT + dt / FLIGHT_DUR);
  const e = easeInOut(flightT);
  camera.position.lerpVectors(flightFrom, flightTo, e);
  // Look slightly ahead of destination
  const look = flightTo.clone().add(flightTo.clone().sub(flightFrom).normalize().multiplyScalar(1));
  camera.lookAt(look);
  if (flightT >= 1) {
    isFlying = false;
    flyingToEl.classList.remove('visible');
    checkProximity();
  }
}

// ─────────────────────────────────────────────────────────────
//  PROXIMITY → INFO PANEL
// ─────────────────────────────────────────────────────────────
const infoPanel  = document.getElementById('info-panel');
const panelName  = document.getElementById('panel-name');
const panelFacts = document.getElementById('panel-facts');
let currentPanel = null;

function showPanel(body) {
  if (currentPanel === body.id) return;
  currentPanel = body.id;
  panelName.textContent = body.name;
  panelFacts.innerHTML = Object.entries(body.facts)
    .map(([k,v]) => `<div class="fact-row"><span class="fact-label">${k}</span><span class="fact-value">${v}</span></div>`)
    .join('');
  infoPanel.classList.add('visible');
}

function hidePanel() {
  if (!currentPanel) return;
  currentPanel = null;
  infoPanel.classList.remove('visible');
}

let lastProx = 0;
function checkProximity() {
  let closest = null, closestD = Infinity;
  planetPivots.forEach(({ mesh, body, dispR, moons }) => {
    const d = camera.position.distanceTo(getWorldPos(mesh));
    const thresh = Math.max(2, dispR * 14);
    if (d < thresh && d < closestD) { closestD = d; closest = body; }
    moons.forEach(m => {
      const md = camera.position.distanceTo(getWorldPos(m.mesh));
      const mt = Math.max(1, m.dispR * 18);
      if (md < mt && md < closestD) { closestD = md; closest = m.data; }
    });
  });
  closest ? showPanel(closest) : hidePanel();
}

// ─────────────────────────────────────────────────────────────
//  RAYCASTING — click to fly
// ─────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2();

renderer.domElement.addEventListener('click', e => {
  if (didDrag) return; // was a drag, not a click
  mouse.x =  (e.clientX / innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickableObjects, false);
  if (!hits.length) return;

  const hit   = hits[0].object;
  const id    = hit.userData.bodyId;
  const wpos  = getWorldPos(hit);
  let arrivalDist = 1.5, bodyName = id;

  BODIES.forEach(b => {
    if (b.id === id) {
      arrivalDist = Math.max(0.5, b.realRadius * DISPLAY_SCALE) * 4;
      bodyName = b.name;
    }
    if (b.moons) b.moons.forEach(m => {
      if (m.id === id) {
        arrivalDist = Math.max(0.3, m.realRadius * DISPLAY_SCALE) * 6;
        bodyName = m.name;
      }
    });
  });
  startFlight(wpos, bodyName, arrivalDist);
});

// Scroll to zoom
renderer.domElement.addEventListener('wheel', e => {
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  camera.position.addScaledVector(dir, -e.deltaY * 0.18);
}, { passive: true });

// ─────────────────────────────────────────────────────────────
//  MAIN LOOP
// ─────────────────────────────────────────────────────────────
let lastTime = performance.now();

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt  = Math.min((now - lastTime) / 1000, 0.05);
  lastTime  = now;

  updateOrbits(dt);
  updateMovement(dt);
  updateFlight(dt);
  updateLabels();

  if (now - lastProx > 600 && !isFlying) { checkProximity(); lastProx = now; }

  renderer.render(scene, camera);
}

// ── Startup ───────────────────────────────────────────────────
// Render one frame first to confirm WebGL context is working,
// then dismiss the loading screen.
function start() {
  setStatus('Ready.', 100);
  renderer.render(scene, camera); // test render
  const el = document.getElementById('loading');
  el.style.opacity = '0';
  setTimeout(() => { el.style.display = 'none'; }, 700);
  // Update loading bar to full immediately
  const fill = document.querySelector('.loader-fill');
  if (fill) fill.style.width = '100%';
  animate();
}

// Allow clicking loading screen to dismiss if it hangs
document.getElementById('loading').addEventListener('click', () => {
  if (typeof THREE !== 'undefined') start();
});

// Auto-start after a short pause (allows first paint to flush)
setTimeout(start, 400);

} // end initScene
</script>
</body>
